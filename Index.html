<!DOCTYPE html>
<html>
<head>
    <title>System Error</title>
    <style>
        body { background-color: black; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .text { font-size: 20px; text-align: center; }
        .warning { color: red; font-weight: bold; font-size: 30px; }
    </style>
</head>
<body>
    <div class="text">
        <p class="warning">WARNING!</p>
        <p>System Failure Detected...</p>
        <p>Accessing Private Gallery...</p>
        <p id="counter">Deleting Data in 5...</p>
    </div>
    <script>
        let count = 5;
        setInterval(() => {
            if(count > 0) {
                count--;
                document.getElementById('counter').innerText = "Deleting Data in " + count + "...";
            } else {
                document.getElementById('counter').innerText = "PRANK! Canda doang bro!";
                document.getElementById('counter').style.color = "yellow";
            }
        }, 1000);
    </script>
</body>
</html>
